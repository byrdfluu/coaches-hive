<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light only" />
    <title>Guardian approval requested</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f3efe9;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
      {{athlete_name}} needs your approval to continue on Coaches Hive.
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width:100%;border-collapse:collapse;background-color:#f3efe9;margin:0;padding:0;">
      <tr>
        <td align="center" style="padding:24px 12px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width:100%;max-width:600px;border-collapse:collapse;background-color:#efe7de;border-radius:28px;overflow:hidden;">
            <tr>
              <td style="padding:20px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width:100%;border-collapse:collapse;background-color:#ffffff;border-radius:24px;overflow:hidden;">
                  <tr>
                    <td style="background-color:#b80f0a;padding:24px 24px 20px 24px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width:100%;border-collapse:collapse;">
                        <tr>
                          <td valign="middle" style="width:88px;">
                            <div style="width:72px;height:72px;background-color:#ffffff;border-radius:0;display:block;text-align:center;line-height:72px;">
                              <img
                                src="https://coacheshive.com/CHLogoTransparent.PNG"
                                alt="Coaches Hive"
                                width="72"
                                height="72"
                                style="display:block;width:72px;height:72px;border:0;outline:none;text-decoration:none;"
                              />
                            </div>
                          </td>
                          <td valign="middle" style="padding-left:16px;">
                            <div style="font-family:Arial,Helvetica,sans-serif;font-size:24px;line-height:28px;font-weight:700;letter-spacing:0.5px;color:#ffffff;">
                              COACHESHIVE
                            </div>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>

                  <tr>
                    <td style="padding:28px 24px 24px 24px;background-color:#ffffff;">
                      <div style="font-family:Arial,Helvetica,sans-serif;font-size:18px;line-height:24px;font-weight:700;color:#191919;margin:0 0 18px 0;">
                        Guardian approval requested
                      </div>

                      <div style="font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:24px;color:#191919;margin:0 0 14px 0;">
                        Hi {{first_name}},
                      </div>

                      <div style="font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:24px;color:#191919;margin:0 0 22px 0;">
                        {{message_preview}}
                      </div>

                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 0 24px 0;">
                        <tr>
                          <td align="center" bgcolor="#b80f0a" style="border-radius:999px;background-color:#b80f0a;">
                            <a
                              href="{{action_url}}"
                              style="display:inline-block;padding:14px 26px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:18px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:999px;background-color:#b80f0a;"
                            >
                              Review request
                            </a>
                          </td>
                        </tr>
                      </table>

                      <div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:21px;color:#4a4a4a;margin:0 0 16px 0;">
                        If the button does not work, copy and paste this link into your browser:
                      </div>
                      <div style="font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:20px;color:#4a4a4a;word-break:break-word;margin:0 0 24px 0;">
                        <a href="{{action_url}}" style="color:#b80f0a;text-decoration:underline;">{{action_url}}</a>
                      </div>

                      <div style="border-top:1px solid #ded8d1;font-size:0;line-height:0;height:1px;margin:0 0 20px 0;">&nbsp;</div>

                      <div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:22px;color:#4a4a4a;">
                        Coaches Hive
                        <br />
                        Need help?
                        <a href="mailto:{{support_email}}" style="color:#b80f0a;text-decoration:none;font-weight:700;">{{support_email}}</a>
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
